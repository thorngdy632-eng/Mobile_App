name: taohjoul
description: "តស់ជួល! - Agricultural Equipment Rental App"
publish_to: 'none'
version: 1.0.0+1

environment:
  # Updated minimum SDK to 3.5.0 to stay compatible with Flutter 3.44+ 
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase Core & Services
  firebase_core: ^3.10.1
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.2

  # State management
  provider: ^6.1.2

  # Media & Hardware
  image_picker: ^1.1.2

  # Google Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Map (flutter_map + latlong2)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # ➕ បន្ថែម Package សម្រាប់បង្កើត Icon ស្វ័យប្រវត្តិនៅត្រង់នេះ
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  # This forces your map packages to use the modern math types required by the framework
  vector_math: ^2.4.0

# ⚙️ កំណត់ទីតាំងរូបភាព Icon សម្រាប់កម្មវិធី តស់ជួល!
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png" # ⚠️ ត្រូវប្រាកដថាប្អូនមានរូបភាពឈ្មោះ app_icon.png នៅក្នុងថតនេះ
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # fonts:
  #   - family: KhmerOS
  #     fonts:
  #       - asset: assets/fonts/KhmerOS.ttf